<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Ads</title>
<link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div class="container">

<h1>🎥 Watch Ads</h1>

<div class="balance-card">
    <h3>Reward</h3>
    <h1>৳0.05</h1>
</div>
    <button class="btn" onclick="claimReward()">
🎁 Claim Reward
</button>

<script>
function claimReward(){

let balance =
parseFloat(localStorage.getItem("balance") || 0);

balance += 0.05;

localStorage.setItem(
"balance",
balance.toFixed(2)
);

alert("৳0.05 Added");

}
</script>

<p id="status"></p>

</div>

<script>
function openAd(){
    document.getElementById("status").innerHTML =
    "Ad opened. Reward system will be added later.";
}
</script>
<div class="bottom-nav">
    <a href="index.html">🏠<br>Home</a>
    <a href="ads.html">🎥<br>Earn</a>
    <a href="refer.html">👥<br>Refer</a>
    <a href="withdraw.html">💸<br>Withdraw</a>
</div>
    <script>

const SUPABASE_URL =
"https://gwrplydmjbdkheecnoqv.supabase.co";

const SUPABASE_KEY =
"YOUR_NEW_ANON_KEY";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

async function claimReward(){

const tg = window.Telegram.WebApp;

const userId =
tg.initDataUnsafe.user.id;

const { data } =
await supabaseClient
.from("users")
.select("balance")
.eq("id", userId)
.single();

let currentBalance =
Number(data.balance || 0);

let newBalance =
currentBalance + 0.05;

await supabaseClient
.from("users")
.update({
balance: newBalance
})
.eq("id", userId);

alert(
"৳0.05 Added\nNew Balance: ৳" +
newBalance.toFixed(2)
);

}

</script>
</body>
</html>
