<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Withdraw</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>💸 Withdraw</h1>

<div class="balance-card">
    <h3>Available Balance</h3>
    <h1>৳0.00</h1>
</div>

<div class="balance-card">

<p>Method</p>

<select style="width:100%;padding:10px;">
    <option>bKash</option>
</select>

<br><br>

<p>Number</p>

<input type="text"
placeholder="01XXXXXXXXX"
style="width:100%;padding:10px;">

<br><br>

<p>Amount</p>

<input type="number"
placeholder="20"
style="width:100%;padding:10px;">

<br><br>

<button class="btn" onclick="submitWithdraw()">
Submit Withdraw
</button>

</div>

</div>
<div class="bottom-nav">
    <a href="index.html">🏠<br>Home</a>
    <a href="ads.html">🎥<br>Earn</a>
    <a href="refer.html">👥<br>Refer</a>
    <a href="withdraw.html">💸<br>Withdraw</a>
</div>
    <script>

function submitWithdraw(){

let balance =
parseFloat(localStorage.getItem("balance") || 0);

let amount =
parseFloat(document.querySelector(
'input[type="number"]'
).value);

if(balance < 20){

alert(
"Minimum balance is ৳20"
);

return;
}

if(amount > balance){

alert(
"Insufficient Balance"
);

return;
}

alert(
"Withdraw Request Submitted"
);

}

</script>
</body>
</html>
