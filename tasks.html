    <script>

function submitTask(){
    let tasks =
parseInt(
localStorage.getItem("tasks")
|| 0
);

tasks++;

localStorage.setItem(
"tasks",
tasks
);

let file =
document.getElementById(
"proofUpload"
).files[0];

if(!file){

alert(
"Please select a screenshot"
);

return;

}

alert(
"Task Submitted Successfully"
);

}
        if(localStorage.getItem("tasks")==null){
localStorage.setItem("tasks","0");
}

</script>
