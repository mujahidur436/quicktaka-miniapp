async function loadSubmissions(){

data.forEach(item => {

html += `
<div class="balance-card">

<p>User ID: ${item.user_id}</p>

<a href="${item.proof_url}" target="_blank">
View Proof
</a>

<br><br>

<button class="btn"
onclick="approveTask(${item.id})">
✅ Approve
</button>

</div>
`;

});

document.getElementById(
"submissions"
).innerHTML = html;

}

loadSubmissions();

</script>
